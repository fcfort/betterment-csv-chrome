<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: #fff;
        margin: 0;
      }

      #bodyinner {
        margin: 0;
        width: 350px;
        font-family: Helvetica, Arial, sans-serif;
        font-size: 13px;
        max-height: 600px;
        line-height: 1.8em;
      }

      #header {
        padding: 10px 10px 5px;
        font-size: 16px;
        font-weight: bold;
        color: #000;
      }

      #hr {
        border: solid 1px #ccc;
        border-top: none
      }

      #settings, #combined_downloads {
        padding: 10px;
        color: #222;
      }

      .checkboxes label {
        display: block;
        white-space: nowrap;
      }
      .checkboxes input {
        vertical-align: middle;
      }
      .checkboxes label span {
        vertical-align: middle;
        padding-left: 2px;
      }
      #combined_downloads a {
        display: inline-block;
        margin-right: 10px;
        padding: 5px 10px;
        background-color: #eee;
        border: 1px solid #ccc;
        border-radius: 4px;
        text-decoration: none;
        color: #333;
      }
      #combined_downloads button {
        padding: 5px 10px;
      }
    </style>
  </head>
  <body style="overflow:hidden">
    <div id="bodyinner">
      <div id="header">Betterment PDF to CSV options</div>

      <hr id="hr">

      <div id="settings">

        <form action="">
          <b>Export</b> PDFs as

          <div class="checkboxes">

            <label for="csv">
              <input type="checkbox" class="saveOnClick" id="csv">
              <span>CSV</span>
            </label>

            <label for="qif">
              <input type="checkbox" class="saveOnClick" id="qif">
              <span>QIF</span>
            </label>

          </div>

          <div>
          Additional actions:
            <div>
            <label for="combined">
              <input type="checkbox" class="saveOnClick" id="combined">
              <span>Also <b>export all transactions</b> as one file</span>
            </label>
            </div>
          </div>

        </form>
      </div>

      <hr id="hr">

      <div id="combined_downloads">
        <b>Combined Transactions Download:</b>
        <div id="combined_links" style="margin-top: 5px;">
          No combined data available. Visit the Betterment Activity page to generate it.
        </div>
        <button id="clear_combined" style="margin-top: 10px;">Clear Combined Data</button>
      </div>
    </div>

  <script src="options.js"></script>

  </body>
</html>
